<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Running Training Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Content -->
    <div class="container m-2 me-4">
        <select id="level-input" class="mb-3 me-3">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced" selected>Advanced</option>
        </select>

        <label for="start-date-input">Start date:</label>
        <input type="date" id="start-date-input">

        <div class="page-title">Training Plan</div>
        <div class="page-subtitle">Cherry Blossom 10-Mile Training Plan</div>
        <div class="level-subtitle page-subtitle"></div>
        <div id="training-plan-container" class="mt-3"></div>
    </div>

    <!-- Week template -->
    <template id="week-template">
        <details class="card mb-3">
            <summary class="card-header fw-bold">
                Week <span class="week-number"></span>
            </summary>

            <div class="card-body">
                <p class="headnote text-muted"></p>    
                <div class="days"></div>
                <p class="footnote text-muted"></p>
            </div>
        </details>
    </template>

    <!-- Day template -->
    <template id="day-template">
        <details class="card mb-2" open>
            <summary class="card-header fw-bold">
                <span class="day-name"></span> - 
                <span class="workout-type"></span>
                <span class="distance"></span>
            </summary>

            <div class="card-body">
                <div class="workout-overview fw-bold mb-1"></div>
                <div class="workout-details"></div>
                <div class="tip d-flex align-items-center gap-2">
                    <i class="bi bi-lightbulb-fill text-warning"></i>
                    <span class="tip-text fst-italic"></span>
                </div>
            </div>
        </details>
    </template>

    <!-- JS scripts -->
    <script type="module" src="script.js"></script>
</body>
</html>
